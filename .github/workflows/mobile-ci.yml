name: Mobile CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  VITE_API_BASE_URL: https://magisteria-production.up.railway.app

jobs:
  web-and-api:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: python -m pip install -r requirements.txt
      - run: pnpm install --frozen-lockfile
      - run: python -m pytest -q
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:mobile
      - run: pnpm build:web
      - run: pnpm audit --audit-level high

  android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - run: pnpm cap:sync:android
      - run: chmod +x android/gradlew && ./android/gradlew -p android bundleDebug lintDebug testDebugUnitTest

  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: sudo xcode-select -s /Applications/Xcode_26.4.app
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - run: pnpm cap:sync:ios
      - run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

  signed-build-placeholder:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo 'Enable only after configuring GitHub Environments and store signing secrets.'
